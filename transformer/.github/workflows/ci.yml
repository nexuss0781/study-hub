name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build and test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate release workflow
        shell: pwsh
        run: ./scripts/verify_release.ps1 -Generator Ninja -Configuration Release

      - name: Benchmark release path
        shell: pwsh
        run: ./tools/benchmark_release.ps1 -Generator Ninja -Configuration Release
